<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pop the Memories 🎈❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      overflow:hidden;
      height:100vh;
      background: linear-gradient(135deg,#ffd6e8,#f3d7ff,#ffe5d0,#ffffff);
      position:relative;
    }

    h1{
      position:absolute;
      top:20px;
      width:100%;
      text-align:center;
      color:#ff5c8a;
      font-size:2rem;
      z-index:10;
      text-shadow:0 2px 10px rgba(255,255,255,0.8);
    }

    /* Floating Hearts */
    .heart{
      position:absolute;
      color:#ff8db3;
      font-size:20px;
      animation: floatHeart linear infinite;
      opacity:0.7;
      pointer-events:none;
    }

    @keyframes floatHeart{
      from{
        transform:translateY(100vh) scale(0.5);
      }
      to{
        transform:translateY(-120vh) scale(1.2);
      }
    }

    /* Balloon Styling */
    .balloon{
      position:absolute;
      width:85px;
      height:105px;
      border-radius:50%;
      cursor:pointer;
      animation: float 4s ease-in-out infinite;
      transition: transform 0.2s;
      box-shadow: inset -8px -12px rgba(255,255,255,0.3);
    }

    .balloon::after{
      content:"";
      position:absolute;
      width:2px;
      height:80px;
      background:white;
      top:100px;
      left:50%;
    }

    .balloon:hover{
      transform:scale(1.08);
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-18px);
      }
    }

    /* Pop Animation */
    .pop{
      animation: popAnim 0.5s forwards;
    }

    @keyframes popAnim{
      0%{
        transform:scale(1);
        opacity:1;
      }
      100%{
        transform:scale(1.8);
        opacity:0;
      }
    }

    /* Memory Card */
    .memory-card{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,0.25);
      backdrop-filter:blur(8px);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:100;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

    .card{
      background:white;
      width:90%;
      max-width:330px;
      border-radius:25px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.12);
      text-align:center;
      padding-bottom:20px;
      animation: cardPop 0.4s ease;
    }

    @keyframes cardPop{
      from{
        transform:scale(0.7);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    .card img{
      width:100%;
      height:280px;
      object-fit:cover;
    }

    .card p{
      padding:18px;
      color:#ff5c8a;
      font-size:1rem;
      line-height:1.6;
    }

    .close-btn{
      border:none;
      background:#ffb6c1;
      color:white;
      padding:10px 22px;
      border-radius:20px;
      cursor:pointer;
      font-size:1rem;
      transition:0.3s;
    }

    .close-btn:hover{
      background:#ff7aa5;
    }

    /* Final Message */
    .final-message{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      background:rgba(255,255,255,0.85);
      backdrop-filter:blur(10px);
      z-index:200;
      text-align:center;
      padding:20px;
      animation: fadeIn 1s ease;
    }

    .final-message h2{
      color:#ff5c8a;
      font-size:2rem;
      margin-bottom:15px;
    }

    .final-message p{
      color:#666;
      font-size:1.1rem;
      max-width:500px;
      line-height:1.8;
    }

    /* Sparkles */
    .sparkle{
      position:absolute;
      color:white;
      font-size:14px;
      animation:sparkleAnim 2s linear infinite;
      pointer-events:none;
    }

    @keyframes sparkleAnim{
      0%{
        opacity:0;
        transform:scale(0.5);
      }
      50%{
        opacity:1;
        transform:scale(1);
      }
      100%{
        opacity:0;
        transform:scale(0.5);
      }
    }

    @media(max-width:600px){
      h1{
        font-size:1.6rem;
      }

      .balloon{
        width:70px;
        height:90px;
      }

      .balloon::after{
        height:60px;
        top:85px;
      }
    }
  </style>
</head>

<body>

  <h1>Pop the Memories 🎈❤️</h1>

  <!-- Optional Background Music -->
  <!-- Replace music.mp3 with your song -->
  <audio autoplay loop>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <script>

    // ==========================================
    // CUSTOMIZE YOUR MEMORIES HERE ❤️
    // Replace image links and captions
    // ==========================================

    const memories = [
      {
        image:"https://images.unsplash.com/photo-1511988617509-a57c8a288659?q=80&w=800",
        caption:"You are my safe place ❤️"
      },
      {
        image:"https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=800",
        caption:"Thank you for every hug ❤️"
      },
      {
        image:"https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=800",
        caption:"You made my childhood beautiful."
      },
      {
        image:"https://images.unsplash.com/photo-1516589091380-5d8e87df6999?q=80&w=800",
        caption:"Home feels like you."
      },
      {
        image:"https://images.unsplash.com/photo-1519345182560-3f2917c472ef?q=80&w=800",
        caption:"Love you forever, Mom."
      },
      {
        image:"https://images.unsplash.com/photo-1511988617509-a57c8a288659?q=80&w=800",
        caption:"You are my safe place ❤️"
      }
    ];

    const balloonColors = [
      "#ffb3c6",
      "#d9b3ff",
      "#ffd6a5",
      "#b5ead7",
      "#ffdac1"
    ];

    let poppedCount = 0;

    // Create Balloons
    memories.forEach((memory,index)=>{

      const balloon = document.createElement("div");
      balloon.classList.add("balloon");

      balloon.style.background =
      balloonColors[index % balloonColors.length];

      balloon.style.left = Math.random()*85 + "vw";
      balloon.style.top = Math.random()*70 + 15 + "vh";

      balloon.style.animationDuration =
      3 + Math.random()*3 + "s";

      document.body.appendChild(balloon);

      balloon.addEventListener("click",()=>{

        balloon.classList.add("pop");

        setTimeout(()=>{
          balloon.remove();
          showMemory(memory);
        },400);

        poppedCount++;

        if(poppedCount === memories.length){
          setTimeout(showFinalMessage,1500);
        }
      });
    });

    // Show Memory Card
    function showMemory(memory){

      const overlay = document.createElement("div");
      overlay.classList.add("memory-card");

      overlay.innerHTML = `
        <div class="card">
          <img src="${memory.image}" alt="Memory">
          <p>${memory.caption}</p>
          <button class="close-btn">Close ❤️</button>
        </div>
      `;

      document.body.appendChild(overlay);

      overlay.querySelector(".close-btn")
      .addEventListener("click",()=>{
        overlay.remove();
      });
    }

    // Final Message
    function showFinalMessage(){

      const finalScreen = document.createElement("div");

      finalScreen.classList.add("final-message");

      finalScreen.innerHTML = `
        <h2>Happy Mother’s Day ❤️</h2>
        <p>
          Thank you for filling my life with love and happiness.
          Every memory with you is magical and precious forever ✨
        </p>
      `;

      document.body.appendChild(finalScreen);
    }

    // Floating Hearts
    function createHeart(){

      const heart = document.createElement("div");
      heart.classList.add("heart");

      heart.innerHTML = "❤️";

      heart.style.left = Math.random()*100 + "vw";
      heart.style.animationDuration =
      4 + Math.random()*6 + "s";

      heart.style.fontSize =
      15 + Math.random()*20 + "px";

      document.body.appendChild(heart);

      setTimeout(()=>{
        heart.remove();
      },10000);
    }

    setInterval(createHeart,700);

    // Sparkles
    function createSparkle(){

      const sparkle = document.createElement("div");
      sparkle.classList.add("sparkle");

      sparkle.innerHTML = "✨";

      sparkle.style.left = Math.random()*100 + "vw";
      sparkle.style.top = Math.random()*100 + "vh";

      sparkle.style.animationDuration =
      1 + Math.random()*2 + "s";

      sparkle.style.fontSize =
      10 + Math.random()*12 + "px";

      document.body.appendChild(sparkle);

      setTimeout(()=>{
        sparkle.remove();
      },2500);
    }

    setInterval(createSparkle,400);

  </script>

</body>
</html>
